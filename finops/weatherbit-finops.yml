description: FOCUS-aligned FinOps for Weatherbit. Weatherbit bills as a tiered subscription (Free /
  Standard / Plus / Business / Enterprise) with a daily call quota and per-second burst limit per tier,
  plus an optional Premium Support add-on at $500/mo. Cost optimization is dominated by tier selection
  and call discipline (caching, batching) since billable units are daily call counts within tier.
sources:
  - https://www.weatherbit.io/pricing
  - https://www.weatherbit.io/api
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Weatherbit
  ServiceCategory: Weather Data API
  ProviderName: Weatherbit
  PublisherName: Weatherbit.io
  InvoiceIssuerName: Weatherbit.io
  BillingCurrency: USD
meters:
  - name: api_calls
    description: Count of billable API calls per key per day across all data endpoints; the daily
      quota scales by subscription tier.
    unit: request
    aggregation: sum
    dimensions:
      - tier
      - api_key
      - endpoint
  - name: historical_calls
    description: Calls against the historical-weather endpoints; separately capped on the Free tier.
    unit: request
    aggregation: sum
    dimensions:
      - tier
      - api_key
  - name: subscription_fee
    description: Recurring monthly subscription fee for the chosen tier (Standard / Plus / Business /
      Enterprise).
    unit: month
    aggregation: sum
    dimensions:
      - tier
  - name: premium_support
    description: Optional Premium Support add-on at $500/mo.
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Track call counts via the API key's dashboard at weatherbit.io; the dashboard surfaces
      per-key daily consumption and remaining quota for the tier.
  - name: Allocation
    description: Use one API key per consuming application or environment so tier cost can be allocated
      cleanly to the owning team. Tag keys in the dashboard with the consuming service name.
  - name: Optimization
    description: Cache forecast and current-weather responses (forecast data updates on a coarse cycle),
      batch geocodes via location lookups, and right-size the tier — moving from Plus to Business is
      worthwhile only when sustained calls exceed 250,000/day.
  - name: Accountability
    description: The integration owner holds accountability; review the dashboard's monthly call trend
      versus tier quota at each renewal cycle and before launching new endpoints / locations.
maintainers:
