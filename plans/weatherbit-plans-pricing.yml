specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Weatherbit
providerId: weatherbit
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Weather
  - Forecasting
  - Historical Data
  - Air Quality
  - Energy
description: Weatherbit sells weather, forecast, historical, air-quality, and energy APIs as a tiered
  daily-call subscription. The Free plan is published; paid tier monthly prices are not displayed on
  the public pricing page (gated behind sign-up / dashboard), so per-tier daily-call quotas and rate
  limits are recorded here while the price strings reference the pricing page. A separate Premium
  Support add-on is published at $500/mo. Plans differ by data depth (forecast horizon, historical
  history) as much as by call volume.
sources:
  - https://www.weatherbit.io/pricing
  - https://www.weatherbit.io/api
plans:
  - id: weatherbit-free
    name: Free
    type: freemium
    description: Non-commercial evaluation tier with 50 calls/day, 7-day forecasts, and current weather.
    entries:
      - label: Daily API Calls
        name: api_calls_per_day
        type: quota
        metric: request
        limit: 50
        timeFrame: day
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Rate Limit
        name: rate_limit
        type: tiered
        metric: requests_per_second
        limit: 1
        timeFrame: second
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
      - label: Historical Weather Calls
        name: historical_calls
        type: quota
        metric: request
        limit: 10000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Current Weather API
      - name: 7-Day Forecast API
      - name: Non-Commercial License
      - name: Basic Support
  - id: weatherbit-standard
    name: Standard
    type: subscription
    description: Commercial-license tier with 25,000 calls/day, 16-day forecasts, hourly forecasts, and
      lightning data.
    entries:
      - label: Daily API Calls
        name: api_calls_per_day
        type: quota
        metric: request
        limit: 25000
        timeFrame: day
        geo: global
        unit: 1
        price: see https://www.weatherbit.io/pricing
        userMultiplied: false
      - label: Rate Limit
        name: rate_limit
        type: tiered
        metric: requests_per_second
        limit: 25
        timeFrame: second
        geo: global
        unit: 1
        price: see https://www.weatherbit.io/pricing
        userMultiplied: false
    elements:
      - name: Current Weather API
      - name: 16-Day Forecast API
      - name: Hourly Forecast API
      - name: Lightning Data
      - name: Commercial License
  - id: weatherbit-plus
    name: Plus
    type: subscription
    description: Higher-volume tier with 250,000 calls/day adding climate normals, 5-year historical,
      and weather maps.
    entries:
      - label: Daily API Calls
        name: api_calls_per_day
        type: quota
        metric: request
        limit: 250000
        timeFrame: day
        geo: global
        unit: 1
        price: see https://www.weatherbit.io/pricing
        userMultiplied: false
      - label: Rate Limit
        name: rate_limit
        type: tiered
        metric: requests_per_second
        limit: 50
        timeFrame: second
        geo: global
        unit: 1
        price: see https://www.weatherbit.io/pricing
        userMultiplied: false
    elements:
      - name: Climate Normals
      - name: 5-Year Historical
      - name: Weather Maps
      - name: Commercial License
  - id: weatherbit-business
    name: Business
    type: subscription
    description: 2M calls/day with 25-year historical, air-quality, agricultural-weather, and energy APIs.
    entries:
      - label: Daily API Calls
        name: api_calls_per_day
        type: quota
        metric: request
        limit: 2000000
        timeFrame: day
        geo: global
        unit: 1
        price: see https://www.weatherbit.io/pricing
        userMultiplied: false
      - label: Rate Limit
        name: rate_limit
        type: tiered
        metric: requests_per_second
        limit: 150
        timeFrame: second
        geo: global
        unit: 1
        price: see https://www.weatherbit.io/pricing
        userMultiplied: false
    elements:
      - name: 25-Year Historical
      - name: Air Quality API
      - name: Agricultural Weather API
      - name: Energy API
      - name: Commercial License
  - id: weatherbit-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-volume tier above 2M calls/day with extended historical access and negotiated
      SLA / custom terms.
    entries:
      - label: Daily API Calls
        name: api_calls_per_day
        type: quota
        metric: request
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Rate Limit
        name: rate_limit
        type: tiered
        metric: requests_per_second
        limit: -1
        timeFrame: second
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Custom Daily Volume
      - name: Extended Historical (>25 years)
      - name: Negotiated SLA
      - name: Custom Terms
  - id: weatherbit-premium-support
    name: Premium Support
    type: subscription
    description: Add-on premium support package, sold separately from the data plans.
    entries:
      - label: Premium Support
        name: premium_support
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$500'
        userMultiplied: false
    elements:
      - name: Premium Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
