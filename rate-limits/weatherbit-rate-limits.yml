specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Weatherbit
providerId: weatherbit
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Weather
  - Forecasting
  - Historical Data
  - Air Quality
  - Rate Limiting
description: Weatherbit applies a per-API-key daily call quota plus a per-second rate limit, both
  scaled by subscription tier. Limits are published on the pricing page and apply across the data
  endpoints; quota resets on a daily cycle.
sources:
  - https://www.weatherbit.io/pricing
  - https://www.weatherbit.io/api
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Free Tier - Daily Quota
    scope: key
    metric: requests_per_day
    limit: 50
    timeFrame: day
    notes: Resets daily; non-commercial use only.
  - name: Free Tier - Burst Rate
    scope: key
    metric: requests_per_second
    limit: 1
    timeFrame: second
  - name: Standard Tier - Daily Quota
    scope: key
    metric: requests_per_day
    limit: 25000
    timeFrame: day
  - name: Standard Tier - Burst Rate
    scope: key
    metric: requests_per_second
    limit: 25
    timeFrame: second
  - name: Plus Tier - Daily Quota
    scope: key
    metric: requests_per_day
    limit: 250000
    timeFrame: day
  - name: Plus Tier - Burst Rate
    scope: key
    metric: requests_per_second
    limit: 50
    timeFrame: second
  - name: Business Tier - Daily Quota
    scope: key
    metric: requests_per_day
    limit: 2000000
    timeFrame: day
  - name: Business Tier - Burst Rate
    scope: key
    metric: requests_per_second
    limit: 150
    timeFrame: second
  - name: Enterprise Tier
    scope: key
    metric: varies
    limit: custom; >2M calls/day, negotiated rate
  - name: Historical Weather Calls (Free)
    scope: key
    metric: requests_per_month
    limit: 10000
    timeFrame: month
    notes: Separate monthly cap for historical-weather endpoints on the Free tier.
policies:
  - name: Per-Key Scoping
    description: Limits and daily quotas are scoped to the API key. Sign in to the dashboard to upgrade
      or downgrade the key's plan.
  - name: Tier Upgrades
    description: A 21-day Business-Plan trial is offered at sign-up; production volume is gated by
      moving the key onto a paid tier.
  - name: Backoff
    description: Clients should back off and retry after exceeding the per-second rate limit; the
      daily quota resets on a daily cycle.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
