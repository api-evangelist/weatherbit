naftiko: 1.0.0-alpha2
info:
  label: Weatherbit - Interactive Swagger UI Documentation — Historical Air Quality
  description: 'Weatherbit - Interactive Swagger UI Documentation — Historical Air Quality. 1 operations. Lead operation:
    Weatherbit Returns 72 Hours of Historical Air Quality Conditions - Given a Geolocation.. Self-contained Naftiko capability
    covering one Weatherbit business surface.'
  tags:
  - Weatherbit
  - Historical Air Quality
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEATHERBIT_API_KEY: WEATHERBIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: current-weather-historical-air-quality
    baseUri: https://api.weatherbit.io/v2.0
    description: Weatherbit - Interactive Swagger UI Documentation — Historical Air Quality business capability. Self-contained,
      no shared references.
    resources:
    - name: history-airquality
      path: /history/airquality
      operations:
      - name: get
        method: GET
        description: Weatherbit Returns 72 Hours of Historical Air Quality Conditions - Given a Geolocation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lat
          in: query
          type: number
          description: Latitude component of location.
        - name: lon
          in: query
          type: number
          description: Longitude component of location.
        - name: city_id
          in: query
          type: string
          description: 'City ID. Example: 4487042'
        - name: city
          in: query
          type: string
          description: City search.. Example - &city=Raleigh,NC or &city=Berlin,DE or city=Paris&country=FR
        - name: postal_code
          in: query
          type: string
          description: 'Postal Code. Example: 28546'
        - name: country
          in: query
          type: string
          description: Country Code (2 letter) - to be used with postal_code.
        - name: key
          in: query
          type: string
          description: Your registered API key.
          required: true
  exposes:
  - type: rest
    namespace: current-weather-historical-air-quality-rest
    port: 8080
    description: REST adapter for Weatherbit - Interactive Swagger UI Documentation — Historical Air Quality. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/history/airquality
      name: history-airquality
      description: REST surface for history-airquality.
      operations:
      - method: GET
        name: get
        description: Weatherbit Returns 72 Hours of Historical Air Quality Conditions - Given a Geolocation.
        call: current-weather-historical-air-quality.get
        with:
          lat: rest.lat
          lon: rest.lon
          city_id: rest.city_id
          city: rest.city
          postal_code: rest.postal_code
          country: rest.country
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: current-weather-historical-air-quality-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weatherbit - Interactive Swagger UI Documentation — Historical Air Quality. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: weatherbit-returns-72-hours-historical
      description: Weatherbit Returns 72 Hours of Historical Air Quality Conditions - Given a Geolocation.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: current-weather-historical-air-quality.get
      with:
        lat: tools.lat
        lon: tools.lon
        city_id: tools.city_id
        city: tools.city
        postal_code: tools.postal_code
        country: tools.country
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
