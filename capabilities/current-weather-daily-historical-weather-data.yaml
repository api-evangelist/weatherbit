naftiko: 1.0.0-alpha2
info:
  label: Weatherbit - Interactive Swagger UI Documentation — Daily Historical Weather Data
  description: 'Weatherbit - Interactive Swagger UI Documentation — Daily Historical Weather Data. 1 operations. Lead operation:
    Weatherbit Returns Historical Observations - Given a Lat/lon.. Self-contained Naftiko capability covering one Weatherbit
    business surface.'
  tags:
  - Weatherbit
  - Daily Historical Weather Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEATHERBIT_API_KEY: WEATHERBIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: current-weather-daily-historical-weather-data
    baseUri: https://api.weatherbit.io/v2.0
    description: Weatherbit - Interactive Swagger UI Documentation — Daily Historical Weather Data business capability. Self-contained,
      no shared references.
    resources:
    - name: history-daily
      path: /history/daily
      operations:
      - name: get
        method: GET
        description: Weatherbit Returns Historical Observations - Given a Lat/lon.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lat
          in: query
          type: number
          description: Latitude component of location.
        - name: lon
          in: query
          type: number
          description: Longitude component of location.
        - name: city_id
          in: query
          type: string
          description: 'City ID. Example: 4487042'
        - name: city
          in: query
          type: string
          description: City search.. Example - &city=Raleigh,NC or &city=Berlin,DE or city=Paris&country=FR
        - name: postal_code
          in: query
          type: string
          description: 'Postal Code. Example: 28546'
        - name: country
          in: query
          type: string
          description: Country Code (2 letter) - to be used with postal_code.
        - name: station
          in: query
          type: string
          description: Station Call ID.
        - name: start_date
          in: query
          type: string
          description: Start Date (YYYY-MM-DD or YYYY-MM-DD:HH).
          required: true
        - name: end_date
          in: query
          type: string
          description: End Date (YYYY-MM-DD or YYYY-MM-DD:HH).
          required: true
        - name: units
          in: query
          type: string
          description: Convert to units. Default Metric See <a target='blank' href='/api/requests'>units field description</a>
        - name: lang
          in: query
          type: string
          description: 'Language (Default: English) See <a target=''blank'' href=''/api/requests''>language field description</a>'
        - name: key
          in: query
          type: string
          description: Your registered API key.
          required: true
  exposes:
  - type: rest
    namespace: current-weather-daily-historical-weather-data-rest
    port: 8080
    description: REST adapter for Weatherbit - Interactive Swagger UI Documentation — Daily Historical Weather Data. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/history/daily
      name: history-daily
      description: REST surface for history-daily.
      operations:
      - method: GET
        name: get
        description: Weatherbit Returns Historical Observations - Given a Lat/lon.
        call: current-weather-daily-historical-weather-data.get
        with:
          lat: rest.lat
          lon: rest.lon
          city_id: rest.city_id
          city: rest.city
          postal_code: rest.postal_code
          country: rest.country
          station: rest.station
          start_date: rest.start_date
          end_date: rest.end_date
          units: rest.units
          lang: rest.lang
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: current-weather-daily-historical-weather-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weatherbit - Interactive Swagger UI Documentation — Daily Historical Weather Data. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: weatherbit-returns-historical-observations-given
      description: Weatherbit Returns Historical Observations - Given a Lat/lon.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: current-weather-daily-historical-weather-data.get
      with:
        lat: tools.lat
        lon: tools.lon
        city_id: tools.city_id
        city: tools.city
        postal_code: tools.postal_code
        country: tools.country
        station: tools.station
        start_date: tools.start_date
        end_date: tools.end_date
        units: tools.units
        lang: tools.lang
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
