naftiko: 1.0.0-alpha2
info:
  label: Weatherbit - Interactive Swagger UI Documentation — Historical Degree Day API
  description: 'Weatherbit - Interactive Swagger UI Documentation — Historical Degree Day API. 1 operations. Lead operation:
    Weatherbit Returns Energy API Response - Given a Single Lat/lon.. Self-contained Naftiko capability covering one Weatherbit
    business surface.'
  tags:
  - Weatherbit
  - Historical Degree Day API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEATHERBIT_API_KEY: WEATHERBIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: current-weather-historical-degree-day-api
    baseUri: https://api.weatherbit.io/v2.0
    description: Weatherbit - Interactive Swagger UI Documentation — Historical Degree Day API business capability. Self-contained,
      no shared references.
    resources:
    - name: history-energy
      path: /history/energy
      operations:
      - name: get
        method: GET
        description: Weatherbit Returns Energy API Response - Given a Single Lat/lon.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lat
          in: query
          type: number
          description: Latitude component of location.
          required: true
        - name: lon
          in: query
          type: number
          description: Longitude component of location.
          required: true
        - name: start_date
          in: query
          type: string
          description: Start Date (YYYY-MM-DD or YYYY-MM-DD:HH).
          required: true
        - name: end_date
          in: query
          type: string
          description: End Date (YYYY-MM-DD or YYYY-MM-DD:HH).
          required: true
        - name: tp
          in: query
          type: string
          description: Time period to aggregate by (daily, monthly)
        - name: threshold
          in: query
          type: number
          description: Temperature threshold to use to calculate degree days (default 18 C)
        - name: units
          in: query
          type: string
          description: Convert to units. Default Metric See <a target='blank' href='/api/requests'>units field description</a>
        - name: key
          in: query
          type: string
          description: Your registered API key.
          required: true
  exposes:
  - type: rest
    namespace: current-weather-historical-degree-day-api-rest
    port: 8080
    description: REST adapter for Weatherbit - Interactive Swagger UI Documentation — Historical Degree Day API. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/history/energy
      name: history-energy
      description: REST surface for history-energy.
      operations:
      - method: GET
        name: get
        description: Weatherbit Returns Energy API Response - Given a Single Lat/lon.
        call: current-weather-historical-degree-day-api.get
        with:
          lat: rest.lat
          lon: rest.lon
          start_date: rest.start_date
          end_date: rest.end_date
          tp: rest.tp
          threshold: rest.threshold
          units: rest.units
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: current-weather-historical-degree-day-api-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weatherbit - Interactive Swagger UI Documentation — Historical Degree Day API. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: weatherbit-returns-energy-api-response
      description: Weatherbit Returns Energy API Response - Given a Single Lat/lon.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: current-weather-historical-degree-day-api.get
      with:
        lat: tools.lat
        lon: tools.lon
        start_date: tools.start_date
        end_date: tools.end_date
        tp: tools.tp
        threshold: tools.threshold
        units: tools.units
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
