naftiko: 1.0.0-alpha2
info:
  label: Weatherbit - Interactive Swagger UI Documentation — 60 Minute Rain/Snow Nowcast
  description: 'Weatherbit - Interactive Swagger UI Documentation — 60 Minute Rain/Snow Nowcast. 1 operations. Lead operation:
    Weatherbit Returns a 60 Minute Precipitation Forecast - Given Lat/Lon.. Self-contained Naftiko capability covering one
    Weatherbit business surface.'
  tags:
  - Weatherbit
  - 60 Minute Rain/Snow Nowcast
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WEATHERBIT_API_KEY: WEATHERBIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: current-weather-60-minute-rain-snow-nowcast
    baseUri: https://api.weatherbit.io/v2.0
    description: Weatherbit - Interactive Swagger UI Documentation — 60 Minute Rain/Snow Nowcast business capability. Self-contained,
      no shared references.
    resources:
    - name: forecast-minutely
      path: /forecast/minutely
      operations:
      - name: get
        method: GET
        description: Weatherbit Returns a 60 Minute Precipitation Forecast - Given Lat/Lon.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lat
          in: query
          type: number
          description: Latitude component of location.
        - name: lon
          in: query
          type: number
          description: Longitude component of location.
        - name: city_id
          in: query
          type: string
          description: 'City ID. Example: 4487042'
        - name: city
          in: query
          type: string
          description: City search.. Example - &city=Raleigh,NC or &city=Berlin,DE or city=Paris&country=FR
        - name: postal_code
          in: query
          type: string
          description: 'Postal Code. Example: 28546'
        - name: country
          in: query
          type: string
          description: Country Code (2 letter) - to be used with postal_code.
        - name: station
          in: query
          type: string
          description: Station Call ID.
        - name: units
          in: query
          type: string
          description: Convert to units. Default Metric See <a target='blank' href='/api/requests'>units field description</a>
        - name: key
          in: query
          type: string
          description: Your registered API key.
          required: true
  exposes:
  - type: rest
    namespace: current-weather-60-minute-rain-snow-nowcast-rest
    port: 8080
    description: REST adapter for Weatherbit - Interactive Swagger UI Documentation — 60 Minute Rain/Snow Nowcast. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/forecast/minutely
      name: forecast-minutely
      description: REST surface for forecast-minutely.
      operations:
      - method: GET
        name: get
        description: Weatherbit Returns a 60 Minute Precipitation Forecast - Given Lat/Lon.
        call: current-weather-60-minute-rain-snow-nowcast.get
        with:
          lat: rest.lat
          lon: rest.lon
          city_id: rest.city_id
          city: rest.city
          postal_code: rest.postal_code
          country: rest.country
          station: rest.station
          units: rest.units
          key: rest.key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: current-weather-60-minute-rain-snow-nowcast-mcp
    port: 9090
    transport: http
    description: MCP adapter for Weatherbit - Interactive Swagger UI Documentation — 60 Minute Rain/Snow Nowcast. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: weatherbit-returns-60-minute-precipitation
      description: Weatherbit Returns a 60 Minute Precipitation Forecast - Given Lat/Lon.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: current-weather-60-minute-rain-snow-nowcast.get
      with:
        lat: tools.lat
        lon: tools.lon
        city_id: tools.city_id
        city: tools.city
        postal_code: tools.postal_code
        country: tools.country
        station: tools.station
        units: tools.units
        key: tools.key
      outputParameters:
      - type: object
        mapping: $.
